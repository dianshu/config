; ESP32-C3 SuperMini — BLE keep-awake keyboard
;
; The version pins below are LOAD-BEARING. The T-vK BLE-Keyboard library only
; builds against arduino-esp32 core 2.0.x + NimBLE-Arduino 1.4.x. Bumping either
; one breaks compilation:
;   - NimBLE-Arduino 2.x  -> API break ("'NimBLEAdvertising' does not name a type")
;   - arduino-esp32 3.x   -> std::string vs Arduino String break in BLEDevice::init()
;
; Verified-good mapping:
;   espressif32@6.9.0    ->  arduino-esp32 core 2.0.17  (from v6.9.0 release notes)
;   NimBLE-Arduino@1.4.3 ->  last 1.x release (supports the C3 RISC-V part)

[env:esp32-c3-supermini]
platform = espressif32@6.9.0
board = esp32-c3-devkitm-1
board_build.mcu = esp32c3
framework = arduino

lib_deps =
    ; The PlatformIO registry does NOT carry this pre-release, so pull it by git
    ; tag (0.3.2-beta is a valid git ref). Do NOT rewrite this back to the
    ; registry form `t-vk/ESP32 BLE Keyboard@0.3.2-beta` — it will not resolve.
    https://github.com/T-vK/ESP32-BLE-Keyboard.git#0.3.2-beta
    h2zero/NimBLE-Arduino@1.4.3

build_flags =
    -D USE_NIMBLE                 ; REQUIRED on C3 — default Bluedroid won't even advertise
    -D ARDUINO_USB_MODE=1         ; native USB Serial/JTAG (the C3 has no UART bridge chip)
    -D ARDUINO_USB_CDC_ON_BOOT=1  ; route Serial.* over the USB-C port

monitor_speed = 115200
